apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: derucci-iot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: derucci-iot-backend:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: derucci-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: derucci-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: derucci-secret
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: derucci-iot
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
