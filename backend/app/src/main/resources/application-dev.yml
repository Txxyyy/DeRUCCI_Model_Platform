spring:
  datasource:
    url: jdbc:h2:file:./data/derucci-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
