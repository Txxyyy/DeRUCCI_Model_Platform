server:
  port: 8080

spring:
  application:
    name: derucci-iot-platform
  profiles:
    active: dev

jwt:
  secret: ${JWT_SECRET:DeRUCCI-IoT-Platform-JWT-Secret-Key-2026}
  access-expiration: ${JWT_ACCESS_EXPIRATION:7200000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  whitelist:
    - /api/auth/login
    - /api/auth/refresh
    - /h2-console/**
    - /actuator/health

management:
  endpoints:
    web:
      exposure:
        include: health,info
