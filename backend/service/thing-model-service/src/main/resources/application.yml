server:
  port: 8083

spring:
  application:
    name: thing-model-service
  datasource:
    url: jdbc:h2:file:./data/thing-model-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  h2:
    console:
      enabled: true

jwt:
  secret: DeRUCCI-IoT-Platform-JWT-Secret-Key-2026
  whitelist:
    - /api/auth/**
    - /h2-console/**
