server:
  port: 8086

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:file:../user-service/data/user-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true

jwt:
  secret: DeRUCCI-IoT-Platform-JWT-Secret-Key-2026
  access-expiration: 7200000
  refresh-expiration: 604800000
  whitelist:
    - /api/auth/login
    - /api/auth/refresh
